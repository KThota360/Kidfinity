<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏰 Kidfinity Chore Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg-gradient: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); --card-bg: rgba(255, 255, 255, 0.95); --text: #334155; --text-muted: #64748b; --accent-green: #10b981; --accent-red: #ef4444; --accent-purple: #8b5cf6; --border: #e2e8f0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg-gradient); background-attachment: fixed; color: var(--text); margin: 0; padding: 20px 10px; }
    .app { max-width: 650px; margin: auto; background: var(--card-bg); padding: 24px; border-radius: 24px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.5); }
    h1 { text-align: center; font-size: 2rem; }
    .tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
    .tabs button { padding: 12px 20px; border-radius: 30px; border: none; background: #f1f5f9; cursor: pointer; font-weight: bold; white-space: nowrap; }
    .tab-active { color: white !important; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .score-banner { background: white; border: 2px solid var(--border); padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
    .stats-row { display: flex; justify-content: space-around; background: #f8fafc; padding: 12px; border-radius: 14px; margin-top: 10px; }
    .card { background: white; border: 2px solid var(--border); border-left: 6px solid #cbd5e1; padding: 16px; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
    .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
    .switch input { opacity: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; border-radius: 34px; transition: .4s; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: .4s; }
    input:checked + .slider { background-color: var(--accent-green); }
    input:checked + .slider:before { transform: translateX(24px); }
    .btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
  </style>
</head>
<body>
<div class="app">
  <h1>🏰 Kidfinity</h1>
  <div class="tabs" id="tabs"></div>
  <div id="content"></div>
</div>

<script>
var SUPABASE_URL = "https://iviohybtosmtvzousqqq.supabase.co"; 
var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2aW9oeWJ0b3NtdHZ6b3VzcXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NDYxOTAsImV4cCI6MjA5ODUyMjE5MH0.0LV25LS-6Yv3EF6_Td5uv-o4Jgm7qNstDSs3RHFRWeo"; 
var PARENT_PIN = "3579";
var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

var kids = [], chores = [], logs = [], redemptions = [], selectedKidId = null, currentTab = "kids", parentUnlocked = false;
var viewingDate = new Date().toISOString().split('T')[0];
var kidColors = ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6'];

async function loadData() {
  var [k, c, l, r] = await Promise.all([
    supabaseClient.from("kids").select("*").order("id"),
    supabaseClient.from("chores").select("*").order("id"),
    supabaseClient.from("task_logs").select("*"),
    supabaseClient.from("redemptions").select("*")
  ]);
  kids = k.data || []; chores = c.data || []; logs = l.data || []; redemptions = r.data || [];
  if (!selectedKidId && kids.length) selectedKidId = kids[0].id;
  render();
}

function getPending() { return JSON.parse(localStorage.getItem(`pend_${selectedKidId}_${viewingDate}`) || "[]"); }
function savePending(arr) { localStorage.setItem(`pend_${selectedKidId}_${viewingDate}`, JSON.stringify(arr)); render(); }

function render() {
  var tabs = document.getElementById("tabs"); tabs.innerHTML = "";
  kids.forEach((k, i) => {
    var btn = document.createElement("button"); btn.textContent = k.name;
    if (selectedKidId === k.id && currentTab === "kids") btn.classList.add("tab-active");
    btn.style.backgroundColor = (selectedKidId === k.id) ? kidColors[i % 5] : '#f1f5f9';
    btn.onclick = () => { selectedKidId = k.id; currentTab = "kids"; render(); };
    tabs.appendChild(btn);
  });
  var pBtn = document.createElement("button"); pBtn.textContent = "⚙️ Parents";
  if (currentTab === "parents") pBtn.classList.add("tab-active");
  pBtn.onclick = () => { currentTab = "parents"; render(); };
  tabs.appendChild(pBtn);

  if (currentTab === "parents") renderParents();
  else renderKid();
}

function renderKid() {
  var kid = kids.find(k => k.id === selectedKidId);
  if (!kid) return;
  var pts = logs.filter(l => l.kid_id === kid.id).reduce((s, l) => s + l.points, 0);
  var cash = redemptions.filter(r => r.kid_id === kid.id).reduce((s, r) => s + r.amount, 0);
  var pend = getPending();
  var pendSum = pend.reduce((s, id) => s + (chores.find(c => c.id == id)?.points || 0), 0);

  var html = `<div class="score-banner"><h2>${kid.name}</h2><div class="stats-row"><div>🏆 ${pts}</div><div>💵 $${cash}</div></div></div>`;
  html += `<div style="display:flex; justify-content:space-between; margin:10px 0;">
             <button onclick="changeDate(-1)">◀</button><span>${viewingDate}</span><button onclick="changeDate(1)">▶</button>
           </div>
           <div style="text-align:right; color:green; font-weight:bold;">Pending: ${pendSum} pts</div>`;

  chores.filter(c => c.kid_id == kid.id).forEach(c => {
    var banked = logs.some(l => l.chore_id == c.id && l.log_date == viewingDate);
    html += `<div class="card"><span>${c.name} (+${c.points})</span>
      ${banked ? '✅' : `<label class="switch"><input type="checkbox" ${pend.includes(c.id) ? 'checked':''} onchange="toggle(${c.id})"><span class="slider"></span></label>`}
    </div>`;
  });
  html += `<input type="password" id="pin" placeholder="PIN"><button class="btn" style="background:#10b981; color:white;" onclick="bank()">Bank</button>
           <button class="btn" style="background:#8b5cf6; color:white;" onclick="redeem()">Redeem $10</button>`;
  document.getElementById("content").innerHTML = html;
}

function toggle(id) { var p = getPending(); if (p.includes(id)) p = p.filter(i => i !== id); else p.push(id); savePending(p); }
function changeDate(d) { var dt = new Date(viewingDate + 'T00:00:00'); dt.setDate(dt.getDate() + d); viewingDate = dt.toISOString().split('T')[0]; render(); }

async function bank() {
  if (document.getElementById('pin').value !== PARENT_PIN) return alert("Wrong PIN");
  var p = getPending();
  var rows = p.map(id => ({ kid_id: selectedKidId, chore_id: id, points: chores.find(c => c.id == id).points, log_date: viewingDate }));
  await supabaseClient.from("task_logs").insert(rows);
  localStorage.removeItem(`pend_${selectedKidId}_${viewingDate}`);
  loadData();
}

async function redeem() {
  if (document.getElementById('pin').value !== PARENT_PIN) return alert("Wrong PIN");
  await supabaseClient.from("redemptions").insert({ kid_id: selectedKidId, amount: 10, points_spent: 500, redeem_date: viewingDate });
  await supabaseClient.from("task_logs").insert({ kid_id: selectedKidId, points: -500, log_date: viewingDate });
  loadData();
}

function renderParents() {
  if (!parentUnlocked) document.getElementById("content").innerHTML = `<input type="password" id="pPin"><button class="btn" onclick="if(document.getElementById('pPin').value=='${PARENT_PIN}'){parentUnlocked=true; render();}">Unlock</button>`;
  else document.getElementById("content").innerHTML = `<h3>Portal</h3><textarea id='cList' rows='4'></textarea><button class='btn' onclick='addBulk()'>Bulk Add</button>`;
}

async function addBulk() {
  var list = document.getElementById('cList').value.split('\n');
  var data = list.map(l => ({ kid_id: selectedKidId, name: l.split(',')[0], points: Number(l.split(',')[1]) }));
  await supabaseClient.from("chores").insert(data);
  loadData();
}

loadData();
</script>
</body>
</html>
