<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏰 Kidfinity Chore Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --border: #334155;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px 10px;
    }

    .app {
      max-width: 600px;
      margin: auto;
      background: var(--card-bg);
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 2rem;
      letter-spacing: -0.025em;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* Tabs Styling */
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .tabs button {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 30px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .tabs button:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .tabs button.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    /* Score Header */
    .score-banner {
      text-align: center;
      background: linear-gradient(135deg, #1e1b4b, #311042);
      border: 1px solid #4338ca;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 24px;
    }

    .score-banner h2 {
      margin: 0 0 5px 0;
      font-size: 1.5rem;
    }

    .points-display {
      font-size: 2.5rem;
      font-weight: 800;
      color: #f59e0b;
      margin: 5px 0;
    }

    /* Chores & Cards */
    .section-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin: 20px 0 10px 0;
      font-weight: 700;
      border-left: 3px solid var(--primary);
      padding-left: 8px;
    }

    .card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      padding: 16px;
      margin: 10px 0;
      border-radius: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }

    .card:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-title {
      font-weight: 600;
      font-size: 1.05rem;
    }

    .card-points {
      font-size: 0.85rem;
      font-weight: 700;
    }

    .points-plus { color: var(--accent-green); }
    .points-minus { color: var(--accent-red); }

    .done {
      text-decoration: line-through;
      color: var(--text-muted);
      opacity: 0.6;
    }

    /* Buttons & Inputs */
    button.action-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-complete {
      background: var(--primary);
      color: white;
    }

    .btn-complete:hover {
      background: var(--primary-hover);
    }

    .btn-completed {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      cursor: not-allowed !important;
    }

    .btn-delete {
      background: rgba(239, 68, 68, 0.1);
      color: var(--accent-red);
      border: 1px solid rgba(239, 68, 68, 0.2) !important;
    }

    .btn-delete:hover {
      background: var(--accent-red);
      color: white;
    }

    input, select {
      background: #0f172a;
      border: 1px solid var(--border);
      color: white;
      padding: 12px;
      border-radius: 10px;
      margin: 8px 0;
      width: 100%;
      box-sizing: border-box;
      font-size: 1rem;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .btn-submit {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover {
      background: var(--primary-hover);
    }

    /* Layout for parent panel grids */
    .parent-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
  </style>
</head>
<body>
<div class="app">
  <h1>🏰 Kidfinity</h1>

  <!-- Navigation Tabs -->
  <div class="tabs" id="tabs"></div>
  
  <!-- Main Display Content Area -->
  <div id="content"></div>
</div>

<script>
// IMPORTANT: Supabase URL and Anon Key
const SUPABASE_URL = "https://iviohybtosmtvzousqqq.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2aW9oeWJ0b3NtdHZ6b3VzcXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NDYxOTAsImV4cCI6MjA5ODUyMjE5MH0.0LV25LS-6Yv3EF6_Td5uv-o4Jgm7qNstDSs3RHFRWeo"; 
const PARENT_PIN = "3579";

// FIX: Renamed the variable to 'supabaseClient' to avoid conflicting with the global 'supabase' object
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let kids = [];
let chores = [];
let logs = [];
let selectedKidId = null;
let currentTab = "kids"; // 'kids' or 'parents'

// Fetch layout data from Supabase
async function loadData() {
  try {
    const { data: kidsData, error: ke } = await supabaseClient.from("kids").select("*").order("id");
    const { data: choresData, error: ce } = await supabaseClient.from("chores").select("*").order("id");
    const { data: logsData, error: le } = await supabaseClient.from("task_logs").select("*");

    if (ke || ce || le) throw (ke || ce || le);

    kids = kidsData || [];
    chores = choresData || [];
    logs = logsData || [];

    // Default to the first kid if none is active
    if (kids.length > 0 && !selectedKidId) {
      selectedKidId = kids[0].id;
    }

    renderTabs();
    
    if (currentTab === "parents") {
      renderParents();
    } else {
      renderKid(selectedKidId);
    }
  } catch (err) {
    console.error("Error loading data from Supabase:", err);
    document.getElementById("content").innerHTML = `<p style="color:var(--accent-red)">Error loading data. Check console or API credentials.</p>`;
  }
}

function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  // Render Kids tabs
  kids.forEach(kid => {
    const btn = document.createElement("button");
    btn.textContent = kid.name;
    if (currentTab === "kids" && selectedKidId === kid.id) {
      btn.classList.add("active");
    }
    btn.onclick = () => {
      currentTab = "kids";
      selectedKidId = kid.id;
      renderTabs();
      renderKid(kid.id);
    };
    tabs.appendChild(btn);
  });

  // Render Parent tab
  const parentBtn = document.createElement("button");
  parentBtn.textContent = "⚙️ Parents Portal";
  if (currentTab === "parents") {
    parentBtn.classList.add("active");
  }
  parentBtn.onclick = openParents;
  tabs.appendChild(parentBtn);
}

function today() {
  // Returns timezone-local YYYY-MM-DD
  const offset = new Date().getTimezoneOffset();
  const localDate = new Date(Date.now() - (offset * 60 * 1000));
  return localDate.toISOString().split('T')[0];
}

function getPoints(kidId) {
  let total = 0;
  logs.filter(l => l.kid_id === kidId).forEach(l => {
    total += l.points;
  });
  return total;
}

function renderKid(kidId) {
  if (!kidId) {
    document.getElementById("content").innerHTML = "<p style='text-align:center;'>No kids added yet. Go to the Parents Portal to start!</p>";
    return;
  }

  const kid = kids.find(k => k.id === kidId);
  if (!kid) return;

  const kidChores = chores.filter(c => c.kid_id === kidId);
  const points = getPoints(kidId);

  // Separate chores (positive points) and penalties (negative points)
  const regularChores = kidChores.filter(c => c.points >= 0);
  const penalties = kidChores.filter(c => c.points < 0);

  let html = `
    <div class="score-banner">
      <h2>${kid.name}</h2>
      <div class="points-display">${points} pts</div>
      <div style="font-size:0.85rem; color: var(--text-muted)">Total Score</div>
    </div>
  `;

  // --- TODAY'S CHORES SECTION ---
  html += `<div class="section-title">Today's Chores</div>`;
  if (regularChores.length === 0) {
    html += `<p style="color:var(--text-muted); font-size:0.9rem; padding: 0 10px;">No positive chores listed.</p>`;
  } else {
    regularChores.forEach(chore => {
      const completed = logs.some(l =>
        l.kid_id === kidId &&
        l.chore_id === chore.id &&
        l.log_date === today()
      );

      html += `
        <div class="card">
          <div class="card-info">
            <span class="card-title ${completed ? 'done' : ''}">${chore.name}</span>
            <span class="card-points points-plus">+${chore.points} pts</span>
          </div>
          <div>
            ${completed
              ? `<button class="action-btn btn-completed" disabled>✓ Completed</button>`
              : `<button class="action-btn btn-complete" onclick="completeChore(${kidId}, ${chore.id}, ${chore.points})">Done</button>`
            }
          </div>
        </div>
      `;
    });
  }

  // --- PENALTIES SECTION ---
  html += `<div class="section-title">⚠️ Penalties Today</div>`;
  if (penalties.length === 0) {
    html += `<p style="color:var(--text-muted); font-size:0.9rem; padding: 0 10px;">No penalties listed.</p>`;
  } else {
    penalties.forEach(penalty => {
      const completed = logs.some(l =>
        l.kid_id === kidId &&
        l.chore_id === penalty.id &&
        l.log_date === today()
      );

      html += `
        <div class="card">
          <div class="card-info">
            <span class="card-title ${completed ? 'done' : ''}">${penalty.name}</span>
            <span class="card-points points-minus">${penalty.points} pts</span>
          </div>
          <div>
            ${completed
              ? `<button class="action-btn btn-completed" disabled>Applied Today</button>`
              : `<button class="action-btn btn-delete" onclick="completeChore(${kidId}, ${penalty.id}, ${penalty.points})">Apply Penalty</button>`
            }
          </div>
        </div>
      `;
    });
  }

  document.getElementById("content").innerHTML = html;
}

async function completeChore(kidId, choreId, points) {
  const { error } = await supabaseClient.from("task_logs").insert({
    kid_id: kidId,
    chore_id: choreId,
    points: points,
    log_date: today()
  });
  
  if (error) {
    alert("Error saving progress!");
    console.error(error);
  } else {
    await loadData();
  }
}

function openParents() {
  const pin = prompt("Enter Parent PIN:");
  if (pin !== PARENT_PIN) {
    alert("Wrong PIN");
    renderTabs(); // Reset active classes back to kid tab
    return;
  }
  currentTab = "parents";
  renderTabs();
  renderParents();
}

function renderParents() {
  let html = `
    <h2 style="margin-top:0;">⚙️ Parents Portal</h2>
    <div class="parent-grid">
      
      <!-- ADD KID -->
      <div class="score-banner" style="text-align: left; background: rgba(255,255,255,0.02); border: 1px solid var(--border);">
        <h3 style="margin-top:0; color: #fff;">Add Kid</h3>
        <div class="form-group">
          <input id="kidName" placeholder="e.g., Aadya">
        </div>
        <button class="btn-submit" onclick="addKid()">Add Kid</button>
      </div>

      <!-- ADD CHORE / PENALTY -->
      <div class="score-banner" style="text-align: left; background: rgba(255,255,255,0.02); border: 1px solid var(--border);">
        <h3 style="margin-top:0; color: #fff;">Add Chore or Penalty</h3>
        <div class="form-group">
          <label style="font-size:0.85rem; color:var(--text-muted)">Assign to:</label>
          <select id="choreKid">
            ${kids.map(k => `<option value="${k.id}">${k.name}</option>`).join("")}
          </select>
        </div>
        <div class="form-group">
          <input id="choreName" placeholder="Chore/Penalty name (e.g. 🛏️ Make Bed)">
        </div>
        <div class="form-group">
          <input id="chorePoints" type="number" placeholder="Points (e.g., 10 for Chore, -10 for Penalty)">
        </div>
        <button class="btn-submit" onclick="addChore()">Save Action</button>
      </div>

      <!-- MANUAL ADJUSTMENTS -->
      <div class="score-banner" style="text-align: left; background: rgba(255,255,255,0.02); border: 1px solid var(--border);">
        <h3 style="margin-top:0; color: #fff;">Manual Points Adjustment</h3>
        <div class="form-group">
          <select id="adjustKid">
            ${kids.map(k => `<option value="${k.id}">${k.name}</option>`).join("")}
          </select>
        </div>
        <div class="form-group">
          <input id="adjustPoints" type="number" placeholder="Points (e.g. +20 or -15)">
        </div>
        <button class="btn-submit" style="background:#f59e0b;" onclick="adjustPoints()">Apply Adjustment</button>
      </div>

      <!-- MANAGE ACTIONS -->
      <div>
        <h3 style="color: var(--text)">Manage Actions</h3>
  `;

  if (chores.length === 0) {
    html += `<p style="color:var(--text-muted)">No chores setup yet.</p>`;
  } else {
    chores.forEach(chore => {
      const kid = kids.find(k => k.id === chore.kid_id);
      const pointsLabel = chore.points >= 0 ? `+${chore.points}` : `${chore.points}`;
      const colorClass = chore.points >= 0 ? 'points-plus' : 'points-minus';
      
      html += `
        <div class="card">
          <div class="card-info">
            <span><strong>${kid ? kid.name : "System"}</strong>: ${chore.name}</span>
            <span class="${colorClass}" style="font-weight:bold; font-size:0.85rem;">${pointsLabel} pts</span>
          </div>
          <button class="action-btn btn-delete" onclick="deleteChore(${chore.id})">Delete</button>
        </div>
      `;
    });
  }

  html += `
      </div>
    </div>
  `;

  document.getElementById("content").innerHTML = html;
}

async function addKid() {
  const name = document.getElementById("kidName").value;
  if (!name) return alert("Please enter a kid name");

  const { error } = await supabaseClient.from("kids").insert({ name });
  if (error) console.error(error);
  await loadData();
}

async function addChore() {
  const kid_id = Number(document.getElementById("choreKid").value);
  const name = document.getElementById("choreName").value;
  const points = Number(document.getElementById("chorePoints").value);

  if (!name || isNaN(points)) return alert("Please fill out all fields correctly");

  const { error } = await supabaseClient.from("chores").insert({ kid_id, name, points });
  if (error) console.error(error);
  await loadData();
}

async function deleteChore(id) {
  if (!confirm("Are you sure you want to delete this chore? Past points logs will remain intact.")) return;
  const { error } = await supabaseClient.from("chores").delete().eq("id", id);
  if (error) console.error(error);
  await loadData();
}

async function adjustPoints() {
  const kid_id = Number(document.getElementById("adjustKid").value);
  const points = Number(document.getElementById("adjustPoints").value);

  if (isNaN(points)) return alert("Please enter a valid number");

  const { error } = await supabaseClient.from("task_logs").insert({
    kid_id,
    chore_id: null,
    points,
    log_date: today()
  });

  if (error) {
    console.error(error);
  } else {
    alert("Points successfully adjusted!");
  }
  await loadData();
}

// Initial fetch
loadData();
</script></body>
</html>
